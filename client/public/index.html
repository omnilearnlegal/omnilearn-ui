<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OmniLearn Access</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #000;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
      }
      input {
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>🔒 Private Access Only</h2>
    <input id="pw" type="password" placeholder="Enter password" />
    <button onclick="check()">Enter</button>

    <script>
      function check() {
        const pw = document.getElementById("pw").value;
        if (pw === "secret123") {
          window.location.href = "/index.react.html";
        } else {
          alert("Incorrect password");
        }
      }
    </script>
  </body>
</html>
